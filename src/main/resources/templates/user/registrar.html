<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PeGasus - Registrar</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <div class="form-container" style="max-width: 450px; margin: 10vh auto;">
        <h1>Criar Conta</h1>

        <form th:action="@{/user/registrar}" method="post">
            <div class="form-group">
                <label for="nome">Nome de Usuário:</label>
                <input type="text" id="nome" name="nome" placeholder="Escolha um usuário" required>
            </div>

            <div class="form-group">
                <label for="senha">Senha:</label>
                <input type="password" id="senha" name="senha" placeholder="Crie uma senha segura" required>
            </div>

            <div class="form-group">
                <label for="tipoUsuario">Tipo de Usuário:</label>
                <select id="tipoUsuario" name="tipoUsuario">
                    <option value="CLIENTE">Cliente</option>
                    <option value="ADMIN">Administrador</option>
                </select>
            </div>

            <div class="form-actions" style="flex-direction: column; align-items: stretch; gap: 15px;">
                <button type="submit" class="btn-submit" style="width: 100%;">Cadastrar</button>
                <a th:href="@{/user/logar}" class="btn-cancel" style="text-align: center;">Já tem conta? Entrar</a>
            </div>
        </form>
    </div>

</body>
</html>
