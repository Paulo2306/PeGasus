<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments :: head('PeGasus - Lista Produtos')}"></head>

<body class="bg-[#1a1a1a] text-white font-sans antialiased min-h-screen p-5 md:p-8">

    <nav th:replace="~{fragments :: navbar('gerenciamento')}"></nav>

    <div class="max-w-7xl mx-auto bg-black border border-neutral-800 rounded-2xl p-6 md:p-8 shadow-2xl">
        <h2 class="text-2xl md:text-3xl font-extrabold tracking-tight mb-6 flex items-center gap-3 text-white">
            <i class="fa-solid fa-boxes-stacked text-brand-red"></i> Gerenciar Produtos
        </h2>
        <div th:if="${erro}"
            class="bg-red-500/10 text-red-500 border border-red-500/20 p-4 rounded-xl mb-6 text-center text-sm font-semibold flex items-center justify-center gap-2">
            <i class="fa-solid fa-circle-exclamation"></i> [[${erro}]]
        </div>

        <div class="flex flex-wrap gap-3 mb-6">
            <a th:href="@{/produto/formulario}"
                class="px-5 py-2.5 bg-brand-green hover:bg-brand-greenHover text-neutral-950 font-bold rounded-lg text-sm transition-all shadow-md shadow-emerald-950/20 flex items-center gap-2">
                <i class="fa-solid fa-plus"></i> Novo Produto
            </a>
            <a th:href="@{/categoria/formulario}"
                class="px-5 py-2.5 bg-neutral-800 hover:bg-neutral-700 text-white font-semibold rounded-lg text-sm border border-neutral-700 hover:border-neutral-600 transition-all flex items-center gap-2">
                <i class="fa-solid fa-folder-plus"></i> Nova Categoria
            </a>
        </div>

        <div class="overflow-x-auto rounded-xl border border-neutral-800 mb-6">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr
                        class="bg-neutral-950 border-b border-neutral-800 text-xs font-bold uppercase tracking-wider text-brand-red">
                        <th class="py-4 px-5">Nome</th>
                        <th class="py-4 px-5">Imagem</th>
                        <th class="py-4 px-5">Descrição</th>
                        <th class="py-4 px-5">Preço</th>
                        <th class="py-4 px-5">Categoria</th>
                        <th class="py-4 px-5">Características</th>
                        <th class="py-4 px-5 text-center">Opções</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-neutral-900 text-sm">
                    <tr th:each="produto : ${listaProdutos}" class="hover:bg-neutral-950/50 transition-colors">
                        <td class="py-4 px-5 font-semibold text-white">[[${produto.nome}]]</td>

                        <td class="py-4 px-5">
                            <div
                                class="w-12 h-12 rounded-lg border border-neutral-800 overflow-hidden bg-neutral-950 flex items-center justify-center">
                                <img th:if="${produto.imagem != null}"
                                    th:src="@{/produto/imagem/{id}(id=${produto.id})}"
                                    class="w-full h-full object-cover" />
                                <span th:if="${produto.imagem == null}"
                                    class="text-[10px] text-neutral-600 font-semibold uppercase">S/ Foto</span>
                            </div>
                        </td>

                        <td class="py-4 px-5 text-neutral-400 max-w-[200px] truncate">[[${produto.descricao}]]</td>
                        <td class="py-4 px-5 font-bold text-brand-green">R$ <span th:text="${#numbers.formatDecimal(produto.preco, 1, 'POINT', 2, 'COMMA')}">0,00</span></td>
                        <td class="py-4 px-5">
                            <span
                                class="inline-block px-2.5 py-1 text-xs font-bold uppercase tracking-wider bg-neutral-900 text-brand-red border border-neutral-850 rounded-md">
                                [[${produto.categoria?.nome}]]
                            </span>
                        </td>
                        <td class="py-4 px-5 text-xs">
                            <ul class="space-y-1">
                                <li th:each="carac : ${produto.caracteristicas}" class="text-neutral-400">
                                    <strong class="text-neutral-300 font-medium"
                                        th:text="${carac.nome} + ': '"></strong>
                                    <span th:text="${carac.valor}"></span>
                                </li>
                            </ul>
                        </td>
                        <td class="py-4 px-5">
                            <div class="flex items-center justify-center gap-2">
                                <a th:href="@{/produto/{id}(id=${produto.id})}"
                                    class="px-2.5 py-1.5 border border-emerald-500/20 hover:border-emerald-500/40 bg-emerald-500/10 hover:bg-emerald-500/20 text-emerald-400 text-xs font-bold rounded-md transition-all flex items-center gap-1">
                                    <i class="fa-solid fa-eye"></i> Ver
                                </a>
                                <a th:href="@{/produto/{id}/editar(id=${produto.id})}"
                                    class="px-2.5 py-1.5 border border-blue-500/20 hover:border-blue-500/40 bg-blue-500/10 hover:bg-blue-500/20 text-blue-400 text-xs font-bold rounded-md transition-all flex items-center gap-1">
                                    <i class="fa-solid fa-pen-to-square"></i> Editar
                                </a>
                                <a th:href="@{/produto/{id}/excluirProduto(id=${produto.id})}"
                                    class="px-2.5 py-1.5 border border-red-500/20 hover:border-red-500/40 bg-red-500/10 hover:bg-red-500/20 text-red-400 text-xs font-bold rounded-md transition-all flex items-center gap-1">
                                    <i class="fa-solid fa-trash"></i> Deletar
                                </a>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="flex pt-4 border-t border-neutral-800">
            <a th:href="@{/dashboard}"
                class="px-5 py-2.5 border border-neutral-700 hover:border-neutral-500 text-neutral-300 hover:text-white font-medium rounded-lg text-sm transition-all flex items-center gap-2">
                <i class="fa-solid fa-arrow-left"></i> Voltar para o Dashboard
            </a>
        </div>
    </div>

</body>

</html>
