<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments :: head('PeGasus - Editar Produto')}"></head>

<body class="bg-[#1a1a1a] text-white font-sans antialiased min-h-screen p-5 md:p-8">

    <nav th:replace="~{fragments :: navbar('gerenciamento')}"></nav>

    <div class="max-w-2xl mx-auto bg-black border border-neutral-800 rounded-2xl p-6 md:p-8 shadow-2xl">
        <h1
            class="text-2xl font-extrabold tracking-tight mb-6 flex items-center gap-3 text-white border-b border-neutral-800 pb-4">
            <i class="fa-solid fa-pen-to-square text-brand-red"></i> Editar Produto
        </h1>

        <form th:action="@{/produto/atualizar}" th:method="post" enctype="multipart/form-data" class="space-y-6">
            <input type="hidden" name="id" th:value="${produto.id}">

            <div th:if="${erro}"
                class="bg-red-500/10 text-red-500 border border-red-500/20 p-4 rounded-xl text-center text-sm font-semibold flex items-center justify-center gap-2">
                <i class="fa-solid fa-circle-exclamation"></i> [[${erro}]]
            </div>

            <div class="flex flex-col gap-2">
                <label for="nome" class="text-sm font-semibold text-neutral-400">Nome do Produto:</label>
                <input type="text" id="nome" name="nome" th:value="${produto.nome}" required
                    class="w-full bg-neutral-950 border border-neutral-850 hover:border-neutral-700 focus:border-brand-red focus:ring-1 focus:ring-brand-red rounded-lg px-4 py-2.5 text-sm outline-none transition-all text-white">
            </div>

            <div class="flex flex-col gap-2">
                <label for="descricao" class="text-sm font-semibold text-neutral-400">Descrição:</label>
                <input type="text" id="descricao" name="descricao" th:value="${produto.descricao}" required
                    class="w-full bg-neutral-950 border border-neutral-850 hover:border-neutral-700 focus:border-brand-red focus:ring-1 focus:ring-brand-red rounded-lg px-4 py-2.5 text-sm outline-none transition-all text-white">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="flex flex-col gap-2">
                    <label for="preco" class="text-sm font-semibold text-neutral-400">Preço (R$):</label>
                    <input type="number" id="preco" name="preco" step="0.01" th:value="${produto.preco}" required
                        class="w-full bg-neutral-950 border border-neutral-850 hover:border-neutral-700 focus:border-brand-red focus:ring-1 focus:ring-brand-red rounded-lg px-4 py-2.5 text-sm outline-none transition-all text-white">
                </div>

                <div class="flex flex-col gap-2">
                    <label for="categoria" class="text-sm font-semibold text-neutral-400">Categoria:</label>
                    <div class="relative">
                        <select id="categoria" name="categoriaId" required
                            class="w-full bg-neutral-950 border border-neutral-850 hover:border-neutral-700 focus:border-brand-red focus:ring-1 focus:ring-brand-red rounded-lg px-4 py-2.5 text-sm outline-none transition-all text-white cursor-pointer appearance-none">
                            <option th:each="categoria : ${listaCategorias}" th:value="${categoria.id}"
                                th:text="${categoria.nome}" th:selected="${categoria.id} == ${produto.categoria?.id}">
                            </option>
                        </select>
                        <span
                            class="absolute inset-y-0 right-0 pr-3.5 flex items-center text-neutral-500 pointer-events-none">
                            <i class="fa-solid fa-chevron-down text-xs"></i>
                        </span>
                    </div>
                </div>
            </div>

            <div class="flex flex-col gap-2">
                <label class="text-sm font-semibold text-neutral-400">Imagem do Produto:</label>
                <input type="file" name="img" accept="image/*"
                    class="w-full text-sm text-neutral-400 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-xs file:font-semibold file:bg-neutral-800 file:text-white hover:file:bg-neutral-700 file:cursor-pointer border border-neutral-850 rounded-lg p-2 bg-neutral-950">
            </div>

            <div class="bg-neutral-950 border border-neutral-850 rounded-xl p-5 space-y-4">
                <h3 class="text-sm font-bold uppercase tracking-wider text-brand-red flex items-center gap-2">
                    <i class="fa-solid fa-sliders"></i> Características do Produto
                </h3>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" th:name="caracteristicas[0].nome" 
                           th:value="${#lists.size(produto.caracteristicas) > 0 ? produto.caracteristicas[0].nome : ''}"
                           placeholder="Nome"
                           class="w-full bg-neutral-900 border border-neutral-850 focus:border-brand-red focus:ring-1 focus:ring-brand-red rounded-lg px-4 py-2 text-sm outline-none transition-all text-white">
                    <input type="text" th:name="caracteristicas[0].valor" 
                           th:value="${#lists.size(produto.caracteristicas) > 0 ? produto.caracteristicas[0].valor : ''}"
                           placeholder="Valor"
                           class="w-full bg-neutral-900 border border-neutral-850 focus:border-brand-red focus:ring-1 focus:ring-brand-red rounded-lg px-4 py-2 text-sm outline-none transition-all text-white">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" th:name="caracteristicas[1].nome" 
                           th:value="${#lists.size(produto.caracteristicas) > 1 ? produto.caracteristicas[1].nome : ''}"
                           placeholder="Nome"
                           class="w-full bg-neutral-900 border border-neutral-850 focus:border-brand-red focus:ring-1 focus:ring-brand-red rounded-lg px-4 py-2 text-sm outline-none transition-all text-white">
                    <input type="text" th:name="caracteristicas[1].valor" 
                           th:value="${#lists.size(produto.caracteristicas) > 1 ? produto.caracteristicas[1].valor : ''}"
                           placeholder="Valor"
                           class="w-full bg-neutral-900 border border-neutral-850 focus:border-brand-red focus:ring-1 focus:ring-brand-red rounded-lg px-4 py-2 text-sm outline-none transition-all text-white">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" th:name="caracteristicas[2].nome" 
                           th:value="${#lists.size(produto.caracteristicas) > 2 ? produto.caracteristicas[2].nome : ''}"
                           placeholder="Nome"
                           class="w-full bg-neutral-900 border border-neutral-850 focus:border-brand-red focus:ring-1 focus:ring-brand-red rounded-lg px-4 py-2 text-sm outline-none transition-all text-white">
                    <input type="text" th:name="caracteristicas[2].valor" 
                           th:value="${#lists.size(produto.caracteristicas) > 2 ? produto.caracteristicas[2].valor : ''}"
                           placeholder="Valor"
                           class="w-full bg-neutral-900 border border-neutral-850 focus:border-brand-red focus:ring-1 focus:ring-brand-red rounded-lg px-4 py-2 text-sm outline-none transition-all text-white">
                </div>
            </div>

            <div class="flex items-center gap-3 pt-4 border-t border-neutral-800">
                <button type="submit"
                    class="px-6 py-2.5 bg-brand-red hover:bg-brand-redHover text-white font-bold rounded-lg text-sm transition-all shadow-md shadow-red-950/20">
                    Atualizar Produto
                </button>
                <a th:href="@{/produto/lista}"
                    class="px-5 py-2.5 border border-neutral-700 hover:border-neutral-500 text-neutral-300 hover:text-white font-medium rounded-lg text-sm transition-all">
                    Voltar
                </a>
            </div>
        </form>
    </div>

</body>

</html>
