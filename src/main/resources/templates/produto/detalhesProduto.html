<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments :: head('PeGasus - Detalhes do Produto')}"></head>

<body class="bg-[#1a1a1a] text-white font-sans antialiased min-h-screen p-5 md:p-8">

    <nav th:replace="~{fragments :: navbar('loja')}"></nav>

    <div class="max-w-6xl mx-auto bg-black border border-neutral-800 rounded-2xl p-6 md:p-8 shadow-2xl">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 md:gap-12">

            <div
                class="w-full aspect-square md:aspect-[4/3] lg:aspect-auto lg:h-[450px] rounded-xl overflow-hidden border border-neutral-850 bg-neutral-950 flex items-center justify-center shadow-inner">
                <img th:if="${produto.imagem != null}" th:src="@{/produto/imagem/{id}(id=${produto.id})}"
                    alt="Imagem do Produto" class="w-full h-full object-cover" />
                <div class="text-neutral-500 flex flex-col items-center gap-2" th:if="${produto.imagem == null}">
                    <i class="fa-solid fa-image text-4xl"></i>
                    <span class="text-xs uppercase tracking-wider font-semibold">Sem Foto</span>
                </div>
            </div>

            <div class="flex flex-col justify-between">
                <div>
                    <span
                        class="inline-block px-3 py-1 text-xs font-bold uppercase tracking-wider bg-neutral-900 text-brand-red border border-neutral-800 rounded-md mb-4">
                        [[${produto.categoria?.nome}]]
                    </span>

                    <h1 th:text="${produto.nome}"
                        class="text-3xl md:text-4xl font-extrabold tracking-tight text-white mb-2">Nome do Produto</h1>

                    <div class="text-2xl md:text-3xl font-black text-brand-green mb-6">R$ <span th:text="${#numbers.formatDecimal(produto.preco, 1, 'POINT', 2, 'COMMA')}">0,00</span></div>

                    <p
                        class="text-neutral-400 text-sm md:text-base leading-relaxed border-l-4 border-brand-red bg-neutral-950 p-4 rounded-r-lg mb-6">
                        [[${produto.descricao}]]
                    </p>

                    <div class="bg-neutral-950 border border-neutral-850 rounded-xl p-5 mb-6"
                        th:if="${produto.caracteristicas != null && !produto.caracteristicas.isEmpty()}">
                        <h3
                            class="text-sm font-bold uppercase tracking-wider text-brand-red mb-3 flex items-center gap-2 border-b border-neutral-850 pb-2">
                            <i class="fa-solid fa-list-check"></i> Especificações
                        </h3>
                        <ul class="divide-y divide-neutral-900 text-sm">
                            <li th:each="carac : ${produto.caracteristicas}" class="py-2.5 flex justify-between gap-4">
                                <span th:text="${carac.nome}" class="text-neutral-400 font-medium"></span>
                                <span th:text="${carac.valor}" class="text-white font-semibold text-right"></span>
                            </li>
                        </ul>
                    </div>
                </div>

                <div class="flex flex-col sm:flex-row items-center gap-4 pt-4 border-t border-neutral-800">
                    <form th:action="@{/carrinho/adicionar}" method="post" class="w-full sm:flex-1">
                        <input type="hidden" name="produtoId" th:value="${produto.id}">
                        <button type="submit"
                            class="w-full px-6 py-3 bg-brand-green hover:bg-brand-greenHover text-neutral-950 font-bold rounded-lg transition-all shadow-lg shadow-emerald-950/20 hover:scale-[1.01] active:scale-[0.99] flex items-center justify-center gap-2 text-sm md:text-base">
                            <i class="fa-solid fa-cart-plus"></i> Adicionar ao carrinho
                        </button>
                    </form>
                    <a th:href="@{/dashboard}"
                        class="w-full sm:w-auto px-6 py-3 border border-neutral-700 hover:border-neutral-500 text-neutral-300 hover:text-white font-medium rounded-lg text-sm md:text-base transition-all text-center flex items-center justify-center gap-2">
                        <i class="fa-solid fa-arrow-left"></i> Voltar para a loja
                    </a>
                </div>
            </div>

        </div>
    </div>

</body>

</html>
