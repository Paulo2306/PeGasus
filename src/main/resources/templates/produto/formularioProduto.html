<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Produtos</title>
</head>
<body>
    <form th:action="@{/produto/cadastro}" th:method="post" enctype="multipart/form-data">
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" >
        <label for="descricao">Descrição:</label>
        <input type="text" id="descricao" name="descricao" >
        <label for="preco">Preço:</label>
        <input type="number" id="preco" name="preco" step="0.01" >
        <label for="categoria">Categoria:</label>
        <select id="categoria" name="categoriaId">
            <option th:each="categoria : ${listaCategorias}" th:value="${categoria.id}" th:text="${categoria.nome}"></option>
        </select>

        <label>Imagem do Produto:</label><br>
        <input type="file" name="img" accept="image/*">

        <h3>Características do Produto</h3>
            
        <div>
            <input type="text" th:name="caracteristicas[0].nome" placeholder="Nome (Ex: Cor)">
            <input type="text" th:name="caracteristicas[0].valor" placeholder="Valor (Ex: Preto)">
        </div><br>

        <div>
            <input type="text" th:name="caracteristicas[1].nome" placeholder="Nome (Ex: Voltagem)">
            <input type="text" th:name="caracteristicas[1].valor" placeholder="Valor (Ex: 220v)">
        </div><br>

        <div>
            <input type="text" th:name="caracteristicas[2].nome" placeholder="Nome (Ex: Marca)">
            <input type="text" th:name="caracteristicas[2].valor" placeholder="Valor (Ex: Asus)">
        </div><br>

        <button type="submit">Enviar</button>
    </form>
    <a th:href="@{/produto/lista}">Voltar</a>
</body>
</html>
