<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PeGasus - Cadastro de Produto</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <nav>
        <a th:href="@{/dashboard}">Loja</a>
        <th:block th:if="${session.usuarioLogado?.tipo?.name() == 'ADMIN'}">
            <a th:href="@{/produto/lista}">Gerenciar Produtos</a>
            <a th:href="@{/categoria/lista}">Gerenciar Categorias</a>
            <a th:href="@{/cupom/lista}">Gerenciar Cupons</a>
        </th:block>
        <a th:href="@{/carrinho/mostrar}">Meu Carrinho</a>
        <a th:href="@{/user/logout}">Sair</a>
        
        <span class="user-info" th:if="${session.usuarioLogado != null}">
            Olá, [[${session.usuarioLogado.nome}]] ([[${session.usuarioLogado.tipo.getTipo()}]])
        </span>
    </nav>

    <div class="form-container">
        <h1>Cadastro de Produto</h1>
        
        <form th:action="@{/produto/cadastro}" th:method="post" enctype="multipart/form-data">
            
            <div class="form-group">
                <label for="nome">Nome do Produto:</label>
                <input type="text" id="nome" name="nome" placeholder="Digite o nome do produto">
            </div>

            <div class="form-group">
                <label for="descricao">Descrição:</label>
                <input type="text" id="descricao" name="descricao" placeholder="Breve descrição do produto">
            </div>

            <div class="form-group-row">
                <div class="form-group">
                    <label for="preco">Preço (R$):</label>
                    <input type="number" id="preco" name="preco" step="0.01" placeholder="0.00">
                </div>

                <div class="form-group">
                    <label for="categoria">Categoria:</label>
                    <select id="categoria" name="categoriaId">
                        <option th:each="categoria : ${listaCategorias}" 
                                th:value="${categoria.id}" 
                                th:text="${categoria.nome}"></option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Imagem do Produto:</label>
                <input type="file" name="img" accept="image/*" class="file-input">
            </div>

            <div class="features-section">
                <h3>Características do Produto</h3>
                    
                <div class="feature-row">
                    <input type="text" th:name="caracteristicas[0].nome" placeholder="Nome (Ex: Cor)">
                    <input type="text" th:name="caracteristicas[0].valor" placeholder="Valor (Ex: Preto)">
                </div>

                <div class="feature-row">
                    <input type="text" th:name="caracteristicas[1].nome" placeholder="Nome (Ex: Voltagem)">
                    <input type="text" th:name="caracteristicas[1].valor" placeholder="Valor (Ex: 220v)">
                </div>

                <div class="feature-row">
                    <input type="text" th:name="caracteristicas[2].nome" placeholder="Nome (Ex: Marca)">
                    <input type="text" th:name="caracteristicas[2].valor" placeholder="Valor (Ex: Asus)">
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-submit">Cadastrar Produto</button>
                <a th:href="@{/produto/lista}" class="btn-cancel">Voltar</a>
            </div>
        </form>
    </div>

</body>
</html>
