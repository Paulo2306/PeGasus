<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table border="2">
        <thead>
            <tr>
                <th>Nome</th>
                <th>Descrição</th>
                <th>Preço</th>
                <th>Verificar</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="produto : ${listaProdutos}">
                <td>
                    [[${produto.nome}]]
                </td>
                <td>
                    [[${produto.descricao}]]
                </td>
                <td>
                    [[${produto.preco}]]
                </td>
                <td>
                    <a th:href="@{/produto/{id}(id=${produto.id})}">Verificar</a>
                    <a th:href="@{/produto/{id}/editar(id=${produto.id})}">Editar</a>
                    <a th:href="@{/produto/{id}/excluirProduto(id=${produto.id})}">Deletar</a>
                </td>
            </tr>
        </tbody>
    </table>
</body>
</html>
