<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PeGasus - Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <!-- Navegação -->
    <nav>
        <a th:href="@{/dashboard}">Dashboard</a> |
        <th:block th:if="${session.usuarioLogado?.tipo?.name() == 'ADMIN'}">
            <a th:href="@{/produto/lista}">Gerenciar Produtos</a> |
            <a th:href="@{/categoria/lista}">Gerenciar Categorias</a> |
        </th:block>
        <a th:href="@{/carrinho/mostrar}">Meu Carrinho</a> |
        <a th:href="@{/user/logout}">Sair</a>
        <span th:if="${session.usuarioLogado != null}">
            | Olá, <strong th:text="${session.usuarioLogado.nome}">Usuário</strong>
            (<span th:text="${session.usuarioLogado.tipo.getTipo()}">Tipo</span>)
        </span>
    </nav>

    <hr>

    <h1>Dashboard</h1>

    <!-- Busca e Filtro -->
    <form th:action="@{/dashboard}" method="get">
        <input type="hidden" name="page" value="0">
        <input type="text" name="q" th:value="${q}" placeholder="Buscar produtos por nome ou descrição...">
        <select name="categoriaId">
            <option value="">Todas as Categorias</option>
            <option th:each="cat : ${categorias}"
                    th:value="${cat.id}"
                    th:text="${cat.nome}"
                    th:selected="${categoriaId != null && cat.id == categoriaId}"></option>
        </select>
        <button type="submit">Filtrar</button>
        <a th:if="${(q != null && q != '') || (categoriaId != null && categoriaId > 0)}"
           th:href="@{/dashboard}">Limpar Filtros</a>
    </form>

    <br>

    <!-- Grid de Produtos -->
    <div th:if="${produtos == null || produtos.isEmpty()}">
        <p>Nenhum produto encontrado.</p>
    </div>

    <div class="products-grid" th:if="${produtos != null && !produtos.isEmpty()}">
        <div class="product-card" th:each="produto : ${produtos}">
            <img th:if="${produto.imagem != null}"
                 th:src="@{/produto/imagem/{id}(id=${produto.id})}"
                 alt="Imagem do Produto" />
            <span th:if="${produto.imagem == null}">Sem imagem</span>

            <h3 th:text="${produto.nome}">Nome do Produto</h3>
            <p th:text="${produto.descricao}">Descrição</p>
            <p><strong>R$ [[${produto.preco}]],00</strong></p>
            <p>Categoria: [[${produto.categoria?.nome}]]</p>

            <a th:href="@{/produto/{id}(id=${produto.id})}">Ver Detalhes</a>
            <form th:action="@{/carrinho/adicionar}" method="post" style="display:inline;">
                <input type="hidden" name="produtoId" th:value="${produto.id}">
                <button type="submit">Adicionar ao Carrinho</button>
            </form>
        </div>
    </div>

    <!-- Paginação -->
    <div th:if="${totalPages > 1}">
        <br>
        <a th:if="${currentPage > 0}"
           th:href="@{/dashboard(page=${currentPage - 1}, q=${q}, categoriaId=${categoriaId})}">Anterior</a>

        <th:block th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
            <a th:if="${i != currentPage}"
               th:href="@{/dashboard(page=${i}, q=${q}, categoriaId=${categoriaId})}"
               th:text="${i + 1}">1</a>
            <strong th:if="${i == currentPage}" th:text="${i + 1}">1</strong>
        </th:block>

        <a th:if="${currentPage < totalPages - 1}"
           th:href="@{/dashboard(page=${currentPage + 1}, q=${q}, categoriaId=${categoriaId})}">Próxima</a>
    </div>

</body>
</html>
