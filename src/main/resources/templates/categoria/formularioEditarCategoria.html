<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments :: head('PeGasus - Editar Categoria')}"></head>

<body class="bg-[#1a1a1a] text-white font-sans antialiased min-h-screen p-5 md:p-8">

    <nav th:replace="~{fragments :: navbar('gerenciamento')}"></nav>

    <div class="max-w-md mx-auto bg-black border border-neutral-800 rounded-2xl p-6 md:p-8 shadow-2xl">
        <h1
            class="text-2xl font-extrabold tracking-tight mb-6 flex items-center gap-3 text-white border-b border-neutral-800 pb-4">
            <i class="fa-solid fa-pen-to-square text-brand-red"></i> Editar Categoria
        </h1>

        <form th:action="@{/categoria/atualizar}" method="post" class="space-y-5">
            <input type="hidden" name="id" th:value="${categoria.id}">

            <div class="flex flex-col gap-2">
                <label for="nome" class="text-sm font-semibold text-neutral-400">Nome da Categoria:</label>
                <input type="text" id="nome" name="nome" th:value="${categoria.nome}" required
                    class="w-full bg-neutral-950 border border-neutral-850 hover:border-neutral-700 focus:border-brand-red focus:ring-1 focus:ring-brand-red rounded-lg px-4 py-2.5 text-sm outline-none transition-all text-white">
            </div>

            <div class="flex items-center gap-3 pt-4 border-t border-neutral-850">
                <button type="submit"
                    class="px-6 py-2.5 bg-brand-red hover:bg-brand-redHover text-white font-bold rounded-lg text-sm transition-all shadow-md shadow-red-950/20">
                    Atualizar Categoria
                </button>
                <a th:href="@{/categoria/lista}"
                    class="px-5 py-2.5 border border-neutral-700 hover:border-neutral-500 text-neutral-300 hover:text-white font-medium rounded-lg text-sm transition-all">
                    Voltar
                </a>
            </div>
        </form>
    </div>

</body>

</html>
