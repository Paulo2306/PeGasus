<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments :: head('PeGasus - Gerenciar Usuários')}"></head>

<body class="bg-[#1a1a1a] text-white font-sans antialiased min-h-screen p-5 md:p-8">

    <nav th:replace="~{fragments :: navbar('gerenciamento')}"></nav>

    <div class="max-w-5xl mx-auto bg-black border border-neutral-800 rounded-2xl p-6 md:p-8 shadow-2xl">
        <h2
            class="text-2xl md:text-3xl font-extrabold tracking-tight mb-6 flex items-center gap-3 text-white border-b border-neutral-800 pb-4">
            <i class="fa-solid fa-users-gear text-brand-red"></i> Gerenciar Usuários
        </h2>

        <div th:if="${msgSucesso}"
            class="bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 p-4 rounded-xl mb-6 text-center text-sm font-semibold flex items-center justify-center gap-2">
            <i class="fa-solid fa-circle-check text-base"></i> [[${msgSucesso}]]
        </div>
        <div th:if="${msgErro}"
            class="bg-red-500/10 text-red-500 border border-red-500/20 p-4 rounded-xl mb-6 text-center text-sm font-semibold flex items-center justify-center gap-2">
            <i class="fa-solid fa-circle-exclamation text-base"></i> [[${msgErro}]]
        </div>

        <div class="overflow-x-auto rounded-xl border border-neutral-800 mb-6">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr
                        class="bg-neutral-950 border-b border-neutral-800 text-xs font-bold uppercase tracking-wider text-brand-red">
                        <th class="py-4 px-5">ID</th>
                        <th class="py-4 px-5">Nome</th>
                        <th class="py-4 px-5 text-center">Tipo</th>
                        <th class="py-4 px-5 text-center">Status</th>
                        <th class="py-4 px-5 text-center">Opções</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-neutral-900 text-sm">
                    <tr th:each="usuario : ${listaUsuarios}" class="hover:bg-neutral-950/50 transition-colors">
                        <td class="py-4 px-5 text-neutral-500 font-mono text-xs">[[${usuario.id}]]</td>
                        <td class="py-4 px-5 font-semibold text-white">[[${usuario.nome}]]</td>
                        <td class="py-4 px-5 text-center">
                            <span th:if="${usuario.tipo.name() == 'ADMIN'}"
                                class="inline-block px-2.5 py-1 text-xs font-bold uppercase tracking-wider bg-brand-red/10 text-brand-red border border-brand-red/20 rounded-md">
                                Admin
                            </span>
                            <span th:if="${usuario.tipo.name() == 'CLIENTE'}"
                                class="inline-block px-2.5 py-1 text-xs font-bold uppercase tracking-wider bg-blue-500/10 text-blue-400 border border-blue-500/20 rounded-md">
                                Cliente
                            </span>
                        </td>
                        <td class="py-4 px-5 text-center">
                            <span th:if="${usuario.ativo}"
                                class="inline-flex items-center gap-1 px-2.5 py-1 text-xs font-bold uppercase tracking-wider bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 rounded-md">
                                <i class="fa-solid fa-circle text-[6px]"></i> Ativo
                            </span>
                            <span th:if="${!usuario.ativo}"
                                class="inline-flex items-center gap-1 px-2.5 py-1 text-xs font-bold uppercase tracking-wider bg-red-500/10 text-red-400 border border-red-500/20 rounded-md">
                                <i class="fa-solid fa-circle text-[6px]"></i> Inativo
                            </span>
                        </td>
                        <td class="py-4 px-5">
                            <div class="flex items-center justify-center gap-2">
                                <a th:href="@{/admin/usuarios/{id}/editar(id=${usuario.id})}"
                                    class="px-2.5 py-1.5 border border-blue-500/20 hover:border-blue-500/40 bg-blue-500/10 hover:bg-blue-500/20 text-blue-400 text-xs font-bold rounded-md transition-all flex items-center gap-1">
                                    <i class="fa-solid fa-pen-to-square"></i> Editar
                                </a>

                                <a th:if="${usuario.ativo && usuario.id != usuarioLogadoId}"
                                    th:href="@{/admin/usuarios/{id}/desativar(id=${usuario.id})}"
                                    class="px-2.5 py-1.5 border border-red-500/20 hover:border-red-500/40 bg-red-500/10 hover:bg-red-500/20 text-red-400 text-xs font-bold rounded-md transition-all flex items-center gap-1">
                                    <i class="fa-solid fa-user-slash"></i> Desativar
                                </a>

                                <a th:if="${!usuario.ativo}"
                                    th:href="@{/admin/usuarios/{id}/reativar(id=${usuario.id})}"
                                    class="px-2.5 py-1.5 border border-emerald-500/20 hover:border-emerald-500/40 bg-emerald-500/10 hover:bg-emerald-500/20 text-emerald-400 text-xs font-bold rounded-md transition-all flex items-center gap-1">
                                    <i class="fa-solid fa-user-check"></i> Reativar
                                </a>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="pt-4 border-t border-neutral-850">
            <a th:href="@{/admin/painel}"
                class="inline-flex items-center gap-2 px-5 py-2.5 border border-neutral-700 hover:border-neutral-500 text-neutral-300 hover:text-white font-medium rounded-lg text-sm transition-all">
                <i class="fa-solid fa-arrow-left"></i> Voltar ao Painel
            </a>
        </div>
    </div>

</body>

</html>
