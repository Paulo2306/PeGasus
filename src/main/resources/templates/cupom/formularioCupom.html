<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PeGasus - Cadastrar Cupom</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <nav>
        <a th:href="@{/dashboard}">Loja</a>
        <th:block th:if="${session.usuarioLogado?.tipo?.name() == 'ADMIN'}">
            <a th:href="@{/produto/lista}">Gerenciar Produtos</a>
            <a th:href="@{/categoria/lista}">Gerenciar Categorias</a>
        </th:block>
        <a th:href="@{/carrinho/mostrar}">Meu Carrinho</a>
        <a th:href="@{/user/logout}">Sair</a>
        <span class="user-info" th:if="${session.usuarioLogado != null}">
            Olá, [[${session.usuarioLogado.nome}]]
        </span>
    </nav>

    <div class="form-container" style="max-width: 500px;">
        <h1>Novo Cupom de Desconto</h1>
        
        <form th:action="@{/cupom/cadastro}" method="post">
            <div class="form-group">
                <label for="nome">Código do Cupom:</label>
                <input type="text" id="nome" name="nome" placeholder="Ex: PEGASUS10" style="text-transform: uppercase;" required>
            </div>

            <div class="form-group">
                <label for="valorPor">Porcentagem de Desconto (%):</label>
                <input type="number" id="valorPor" name="valorPor" min="1" max="100" placeholder="Ex: 10" required>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-submit">Criar Cupom</button>
                <a th:href="@{/cupom/lista}" class="btn-cancel">Voltar</a>
            </div>
        </form>
    </div>

</body>
</html>
