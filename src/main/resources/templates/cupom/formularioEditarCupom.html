<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PeGasus - Editar Cupom</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <nav>
        <a th:href="@{/dashboard}">Loja</a>
        <th:block th:if="${session.usuarioLogado?.tipo?.name() == 'ADMIN'}">
            <a th:href="@{/produto/lista}">Gerenciar Produtos</a>
            <a th:href="@{/categoria/lista}">Gerenciar Categorias</a>
            <a th:href="@{/cupom/lista}">Gerenciar Cupons</a>
        </th:block>
        <a th:href="@{/carrinho/mostrar}">Meu Carrinho</a>
        <a th:href="@{/user/logout}">Sair</a>
    </nav>

    <div class="form-container" style="max-width: 500px;">
        <h1>Editar Cupom</h1>
        
        <form th:action="@{/cupom/atualizar}" method="post">
            <input type="hidden" name="id" th:value="${cupom.id}">
            
            <div class="form-group">
                <label for="nome">Código do Cupom:</label>
                <input type="text" id="nome" name="nome" th:value="${cupom.nome}" style="text-transform: uppercase;" required>
            </div>

            <div class="form-group">
                <label for="valorPor">valorPor de Desconto (%):</label>
                <input type="number" id="valorPor" name="valorPor" min="1" max="100" th:value="${cupom.valorPor}" required>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-submit">Atualizar Cupom</button>
                <a th:href="@{/cupom/lista}" class="btn-cancel">Voltar</a>
            </div>
        </form>
    </div>

</body>
</html>
