<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments :: head('PeGasus - Gerenciar Cupons')}"></head>

<body class="bg-[#1a1a1a] text-white font-sans antialiased min-h-screen p-5 md:p-8">

    <nav th:replace="~{fragments :: navbar('gerenciamento')}"></nav>

    <div class="max-w-4xl mx-auto bg-black border border-neutral-800 rounded-2xl p-6 md:p-8 shadow-2xl">
        <h2
            class="text-2xl md:text-3xl font-extrabold tracking-tight mb-6 flex items-center gap-3 text-white border-b border-neutral-800 pb-4">
            <i class="fa-solid fa-ticket-simple text-brand-red"></i> Cupons de Desconto
        </h2>
        
        <div th:if="${erro}"
            class="bg-red-500/10 text-red-500 border border-red-500/20 p-4 rounded-xl mb-6 text-center text-sm font-semibold flex items-center justify-center gap-2">
            <i class="fa-solid fa-circle-exclamation"></i> [[${erro}]]
        </div>

        <div class="mb-6">
            <a th:href="@{/cupom/formulario}"
                class="inline-flex items-center gap-2 px-5 py-2.5 bg-brand-green hover:bg-brand-greenHover text-neutral-950 font-bold rounded-lg text-sm transition-all shadow-md shadow-emerald-950/20">
                <i class="fa-solid fa-plus"></i> Novo Cupom
            </a>
        </div>

        <ul class="space-y-3 mb-8">
            <li th:each="cupom : ${listaCupoms}"
                class="flex flex-col sm:flex-row sm:items-center sm:justify-between bg-neutral-950 border border-neutral-850 hover:border-neutral-750 p-4 rounded-xl gap-4 transition-all">
                <div class="flex items-center gap-3">
                    <span
                        class="inline-block px-3 py-1.5 bg-brand-red/10 border border-brand-red/20 text-brand-red font-bold rounded-lg text-sm uppercase tracking-wider">
                        [[${cupom.nome}]]
                    </span>
                    <span class="text-neutral-400 text-sm font-semibold">
                        [[${cupom.valorPor}]]% de desconto
                    </span>
                </div>
                <div class="flex items-center gap-2">
                    <a th:href="@{/cupom/{id}/editar(id=${cupom.id})}"
                        class="px-3 py-1.5 border border-blue-500/20 hover:border-blue-500/40 bg-blue-500/10 hover:bg-blue-500/20 text-blue-400 text-xs font-bold rounded-md transition-all flex items-center gap-1">
                        <i class="fa-solid fa-pen-to-square"></i> Editar
                    </a>
                    <a th:href="@{/cupom/{id}/excluirCupom(id=${cupom.id})}"
                        class="px-3 py-1.5 border border-red-500/20 hover:border-red-500/40 bg-red-500/10 hover:bg-red-500/20 text-red-400 text-xs font-bold rounded-md transition-all flex items-center gap-1">
                        <i class="fa-solid fa-trash"></i> Deletar
                    </a>
                </div>
            </li>
            <li th:if="${listaCupoms == null || listaCupoms.isEmpty()}"
                class="text-center py-12 bg-neutral-950 border border-neutral-850 rounded-xl text-neutral-550 font-medium">
                Nenhum cupom cadastrado ainda.
            </li>
        </ul>

        <div class="pt-4 border-t border-neutral-850">
            <a th:href="@{/dashboard}"
                class="inline-flex items-center gap-2 px-5 py-2.5 border border-neutral-700 hover:border-neutral-500 text-neutral-300 hover:text-white font-medium rounded-lg text-sm transition-all">
                <i class="fa-solid fa-arrow-left"></i> Voltar para o Dashboard
            </a>
        </div>
    </div>

</body>

</html>
